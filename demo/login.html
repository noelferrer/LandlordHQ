<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Landlord HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #F7F8FA;
            --bg-card: #FFFFFF;
            --border: #E2E8F0;
            --primary: #2B7AFF;
            --primary-hover: #1E6BE6;
            --text-main: #0B1D3A;
            --text-muted: #64748B;
            --shadow: 0 8px 24px rgba(11, 29, 58, 0.04);
            --font-display: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 460px;
            padding: 40px 48px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        h2 {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 16px 0;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.2px;
            box-shadow: 0 4px 15px rgba(43, 122, 255, 0.3);
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(43, 122, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .loading-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <svg width="240" height="52" viewBox="0 0 280 52" fill="none">
            <rect x="4" y="8" width="20" height="36" rx="3" fill="#2B7AFF"/>
            <rect x="28" y="2" width="20" height="42" rx="3" fill="#F5A623"/>
            <rect x="9" y="14" width="3.5" height="3.5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="9" y="21" width="3.5" height="3.5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="9" y="28" width="3.5" height="3.5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="15" y="14" width="3.5" height="3.5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="15" y="21" width="3.5" height="3.5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="15" y="28" width="3.5" height="3.5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="33" y="9" width="3.5" height="3.5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="33" y="16" width="3.5" height="3.5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="33" y="23" width="3.5" height="3.5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="39" y="9" width="3.5" height="3.5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="39" y="16" width="3.5" height="3.5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="39" y="23" width="3.5" height="3.5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <text x="60" y="34" font-family="Sora, sans-serif" font-size="26" font-weight="700" fill="#0B1D3A">Landlord</text>
            <text x="187" y="34" font-family="Sora, sans-serif" font-size="26" font-weight="400" fill="rgba(11,29,58,0.4)">HQ</text>
        </svg>
    </div>

    <div class="card" id="step1">
        <h2>Welcome to LandlordHQ</h2>
        <p class="subtitle">Experience the full power of property management instantly. No account required for this demo.</p>
        
        <button onclick="loginAsDemo()">
            <i class="fas fa-play"></i> Start Demo Now
        </button>
        
        <div style="font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-top: 24px; line-height: 1.5;">
            Explore the dashboard, test the Telegram bot integration, and manage units in a safe sandbox environment.
        </div>
    </div>

    <script>
        async function loginAsDemo() {
            const btn = document.querySelector('button');
            const icon = btn.querySelector('i');
            
            try {
                icon.className = 'fas fa-spinner fa-spin';
                btn.disabled = true;
                
                const res = await fetch('api/auth/demo', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('landlordhq_token', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Demo access failed: " + data.error);
                }
            } catch (e) {
                console.error(e);
                alert("Network error entering demo.");
            } finally {
                icon.className = 'fas fa-play';
                btn.disabled = false;
            }
        }

        // Auto-redirect if already logged in AND token is valid
        const token = localStorage.getItem('landlordhq_token');
        if (token) {
            fetch('api/tenants', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => {
                if (res.ok) window.location.href = 'dashboard.html';
                else localStorage.removeItem('landlordhq_token'); // Clear invalid token
            })
            .catch(err => console.error("Verify error:", err));
        }
    </script>
</body>
</html>
