<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Hub | LandlordHQ</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0B1D3A;
            --navy-mid: #132B52;
            --electric: #2B7AFF;
            --electric-light: #5A9BFF;
            --gold: #F5A623;
            --gold-soft: #FCEBD0;
            --white: #FFFFFF;
            --off-white: #F7F8FA;
            --slate: #64748B;
            --light-border: #E2E8F0;
            --success: #22C55E;
            --warning: #F5A623;
            --danger: #f43f5e;
            --info: #3b82f6;

            --primary: var(--electric);
            --primary-hover: var(--electric-light);
            --bg: var(--off-white);
            --text-main: var(--navy);
            --text-muted: var(--slate);
            --border: var(--light-border);
            --shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.08), 0 2px 6px -1px rgba(0, 0, 0, 0.04);

            --font-display: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        @keyframes brandFadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
            animation: brandFadeUp 0.6s ease-out both;
        }

        /* --- Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-text {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--navy);
        }

        .hq-text { font-weight: 400; opacity: 0.6; }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--primary); }

        /* --- Cards --- */
        .card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 30px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--white);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .stat-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .bg-blue { background: rgba(43, 122, 255, 0.1); color: var(--electric); }
        .bg-gold { background: rgba(245, 166, 35, 0.1); color: var(--gold); }
        .bg-green { background: rgba(34, 197, 94, 0.1); color: var(--success); }

        /* --- Table --- */
        h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th {
            background: var(--off-white);
            text-align: left;
            padding: 14px 20px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: rgba(43, 122, 255, 0.02); }

        .code-pill {
            font-family: var(--font-mono);
            background: var(--navy);
            color: var(--white);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .pill-active { background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .pill-claimed { background: rgba(100, 116, 139, 0.1); color: var(--slate); }
        .pill-expired { background: rgba(156, 163, 175, 0.12); color: #9ca3af; }

        /* --- Buttons --- */
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(43, 122, 255, 0.25);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(43, 122, 255, 0.35);
        }

        .btn-primary:active { transform: translateY(0); }

        #error-banner {
            display: none;
            background: rgba(244, 63, 94, 0.1);
            color: var(--danger);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(244, 63, 94, 0.2);
        }
    </style>
</head>
<body>

    <div class="container" id="app-content" style="display: none;">
        <header class="header">
            <div class="logo-box">
                <svg width="40" height="40" viewBox="0 0 56 56" fill="none">
                    <rect x="4" y="12" width="22" height="40" rx="3" fill="#2B7AFF"/>
                    <rect x="30" y="4" width="22" height="48" rx="3" fill="#F5A623"/>
                    <rect x="10" y="20" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="10" y="28" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="10" y="36" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="16" y="20" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="16" y="28" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="16" y="36" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="36" y="12" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="36" y="20" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="36" y="28" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="36" y="36" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="42" y="12" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="42" y="20" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="42" y="28" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                    <rect x="42" y="36" width="4" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
                </svg>
                <span class="logo-text">Landlord<span class="hq-text">HQ</span></span>
            </div>
            <a href="/" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </header>

        <div id="error-banner"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div>
                    <div class="stat-label">Total Invites</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-icon bg-blue">
                    <i class="fas fa-ticket-alt"></i>
                </div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label">Active Codes</div>
                    <div class="stat-value" id="stat-active">0</div>
                </div>
                <div class="stat-icon bg-gold">
                    <i class="fas fa-key"></i>
                </div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label">Claimed Accounts</div>
                    <div class="stat-value" id="stat-claimed">0</div>
                </div>
                <div class="stat-icon bg-green">
                    <i class="fas fa-user-check"></i>
                </div>
            </div>
            <div class="stat-card">
                <div>
                    <div class="stat-label">Expired Codes</div>
                    <div class="stat-value" id="stat-expired">0</div>
                </div>
                <div class="stat-icon" style="background: rgba(156,163,175,0.15); color: #9ca3af;">
                    <i class="fas fa-clock"></i>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px;">
                <div>
                    <h2>Landlord Invite Engine</h2>
                    <p class="subtitle">Securely onboard new landlords with trackable registration codes.</p>
                </div>
                <button class="btn-primary" onclick="generateInvite()">
                    <i class="fas fa-plus"></i> Generate New Invite
                </button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Invite Code</th>
                            <th>Date Generated</th>
                            <th>Status</th>
                            <th>Claimed By</th>
                        </tr>
                    </thead>
                    <tbody id="invites-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = ''; // Relative paths

        // Check auth via cookie
        fetch('/api/auth/check', { credentials: 'include' })
            .then(r => {
                if (!r.ok) { window.location.replace('/login'); return; }
                document.getElementById('app-content').style.display = 'block';
                loadInvites();
            })
            .catch(() => window.location.replace('/login'));

        function showError(msg) {
            const b = document.getElementById('error-banner');
            if (b) {
                b.innerText = msg;
                b.style.display = 'block';
                setTimeout(() => b.style.display = 'none', 5000);
            }
        }

        function getCsrfToken() {
            const match = document.cookie.match(/(?:^|;\s*)landlordhq_csrf=([^;]+)/);
            return match ? match[1] : '';
        }

        async function fetchAPI(endpoint, options = {}) {
            options.credentials = 'include';
            // Add CSRF header for state-changing requests
            if (options.method && !['GET', 'HEAD'].includes(options.method.toUpperCase())) {
                options.headers = { ...options.headers, 'X-CSRF-Token': getCsrfToken() };
            }
            try {
                const res = await fetch(endpoint, options);
                if (res.status === 401 || res.status === 403) {
                    window.location.replace('/');
                    return null;
                }
                return res.json();
            } catch (err) {
                showError("Network error. Please try again.");
                return null;
            }
        }

        async function loadInvites() {
            const invites = await fetchAPI('/api/super/invites');
            if (!invites) return;
            
            const tbody = document.getElementById('invites-body');
            const statTotal = document.getElementById('stat-total');
            const statActive = document.getElementById('stat-active');
            const statClaimed = document.getElementById('stat-claimed');

            if(invites.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding:40px;">No invites generated yet.</td></tr>';
                return;
            }

            // Update stats
            statTotal.innerText = invites.length;
            statActive.innerText = invites.filter(i => i.status === 'active').length;
            statClaimed.innerText = invites.filter(i => i.status === 'claimed').length;
            const statExpired = document.getElementById('stat-expired');
            if (statExpired) statExpired.innerText = invites.filter(i => i.status === 'expired').length;

            invites.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

            tbody.innerHTML = invites.map(i => `
                <tr>
                    <td><span class="code-pill">${i.code}</span></td>
                    <td>
                        <div style="font-weight:500; font-size:0.9rem">${new Date(i.createdAt).toLocaleDateString()}</div>
                        <div style="color:var(--text-muted); font-size:0.75rem">${new Date(i.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    </td>
                    <td>
                        <span class="status-pill ${i.status === 'active' ? 'pill-active' : i.status === 'claimed' ? 'pill-claimed' : 'pill-expired'}">
                            <i class="fas ${i.status === 'active' ? 'fa-circle-check' : i.status === 'claimed' ? 'fa-user-lock' : 'fa-clock'}"></i>
                            ${i.status.toUpperCase()}
                        </span>
                    </td>
                    <td style="font-family:var(--font-mono); font-size:0.85rem; color:var(--navy-mid)">
                        ${i.claimedBy ? `<i class="fab fa-telegram" style="color:#0088cc; margin-right:6px"></i> ${i.claimedBy}` : '<span style="color:var(--text-muted)">Unclaimed</span>'}
                    </td>
                </tr>
            `).join('');
        }

        async function generateInvite() {
            const res = await fetchAPI('/api/super/invites', { method: 'POST' });
            if (res && res.success) {
                loadInvites();
            } else if (res) {
                showError(res.error || "Failed to generate invite.");
            }
        }
    </script>
</body>
</html>
